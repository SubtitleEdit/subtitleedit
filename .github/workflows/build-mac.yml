            echo "SIGNING_AVAILABLE=false" >> $GITHUB_ENV
          fi

      - name: Publish macOS x64 app
        run: |
          dotnet publish src/ui/UI.csproj -c ${{ inputs.build_configuration }} -r osx-x64 --self-contained true \
            -p:PublishSingleFile=true \
