name: Copilot code review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  request-copilot-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! requested_reviewers="$(gh api \
            "/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers" 2>&1)"; then
            echo "Failed to fetch requested reviewers for PR #${{ github.event.pull_request.number }}: $requested_reviewers" >&2
            exit 1
          fi

          if echo "$requested_reviewers" | jq -e '(.users // []) | any(.login | ascii_downcase == "copilot")' >/dev/null; then
            echo "Copilot review already requested, skipping."
            exit 0
          fi

          if ! add_reviewer_output="$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers" \
            -f reviewers[]='copilot' 2>&1)"; then
            echo "Failed to request Copilot review for PR #${{ github.event.pull_request.number }}: $add_reviewer_output" >&2
            exit 1
          fi
